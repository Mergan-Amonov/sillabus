name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: silabuys_test
          POSTGRES_USER: silabuys_user
          POSTGRES_PASSWORD: testpass123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt
        working-directory: .

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://silabuys_user:testpass123@localhost:5432/silabuys_test
          SECRET_KEY: test-secret-key-32-chars-minimum!!
          JWT_SECRET_KEY: test-jwt-secret-key
          POSTGRES_USER: silabuys_user
          POSTGRES_PASSWORD: testpass123
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin123
          OPENAI_API_KEY: sk-test
          FIRST_SUPERADMIN_PASSWORD: Admin123!!
          REDIS_URL: redis://localhost:6379/0
        run: alembic upgrade head
        working-directory: backend

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://silabuys_user:testpass123@localhost:5432/silabuys_test
          SECRET_KEY: test-secret-key-32-chars-minimum!!
          JWT_SECRET_KEY: test-jwt-secret-key
          POSTGRES_USER: silabuys_user
          POSTGRES_PASSWORD: testpass123
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin123
          OPENAI_API_KEY: sk-test
          FIRST_SUPERADMIN_PASSWORD: Admin123!!
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/ -v --tb=short
        working-directory: backend

  frontend-check:
    name: Frontend Type Check & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: frontend

      - name: Type check
        run: npm run type-check
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-check]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --target production -t silabuys-backend:${{ github.sha }} ./backend

      - name: Build frontend image
        run: |
          docker build \
            --target production \
            --build-arg NEXT_PUBLIC_API_URL=https://api.example.com \
            -t silabuys-frontend:${{ github.sha }} \
            ./frontend
